<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot Legal</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0f0f0f;
      color: #eaeaea;
      line-height: 1.6;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: #181818;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a2a2a;
    }

    .navbar a {
      color: #eaeaea;
      text-decoration: none;
      margin-left: 20px;
      font-size: 14px;
    }

    .navbar a:hover {
      color: #ffffff;
    }

    /* CONTAINER */
    .container {
      max-width: 900px;
      margin: 100px auto 60px;
      padding: 0 20px;
    }

    h1, h2 {
      color: #ffffff;
    }

    section {
      margin-bottom: 50px;
    }

    /* FOOTER */
    footer {
      background: #181818;
      padding: 20px;
      text-align: center;
      border-top: 1px solid #2a2a2a;
      font-size: 13px;
      color: #aaa;
    }

    footer a {
      color: #aaa;
      text-decoration: none;
      margin: 0 10px;
    }

    footer a:hover {
      color: white;
    }
  </style>
</head>

<body>

<!-- NAVIGATION -->
<div class="navbar">
  <div><strong>BOT NAME</strong></div>
  <div>
    <a href="#privacy">Privacy Policy</a>
    <a href="#terms">Terms</a>
    <a href="#contact">Contact</a>
  </div>
</div>

<!-- CONTENT -->
<div class="container">

  <section id="privacy">
    <h1>Privacy Policy</h1>
    <p>Your privacy policy text goes here...</p>
  </section>

  <section id="terms">
    <h1>Terms of Service</h1>
    <p>Your terms of service text goes here...</p>
  </section>

  <section id="contact">
    <h1>Contact</h1>
    <p>@bots.01 (Discord)</p>
  </section>

</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 BOTS. All rights reserved.</p>
  <p>
    <a href="#privacy">Privacy</a> |
    <a href="#terms">Terms</a> |
    <a href="#contact">Contact</a>
  </p>
</footer>

</body>
